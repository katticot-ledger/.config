# ===============================
# 🚀 Tmux Configuration File 🚀
# ===============================

# ======================
# 🔧 General Settings
# ======================
set -g extended-keys on                               # ⌨️ Enable extended keys (for pi modified Enter keys)
set -g extended-keys-format csi-u                     # ⌨️ Use CSI-u format (required by pi)
set -g allow-passthrough on                           # 🔔 Allow OSC passthrough (needed for pi-notify)
set -g mouse on                                        # 🖱️ Enable mouse support
set -g base-index 1                                    # 🔢 Start windows at index 1
set -g pane-base-index 1                              # 🔢 Start panes at index 1
set-window-option -g pane-base-index 1                # 🔢 Start panes at index 1
set-option -g renumber-windows on                     # 🔄 Renumber windows automatically
set-option -g default-shell /opt/homebrew/bin/fish    # 🐟 Set fish shell

# ======================
# 🎨 Theme & Appearance
# ======================
# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar position and styling
set-option -g status-position top
set-option -g status-justify left
set-option -g status-style bg=#1e1e2e,fg=#cdd6f4
set-option -g status-left-length 100
set-option -g status-right-length 100

# Left status - Session info with modern styling
set-option -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] 󰇘 #S #[fg=#89b4fa,bg=#313244] #[fg=#cdd6f4,bg=#313244] #I:#P #[fg=#313244,bg=#1e1e2e]"

# Right status - Date and time with clean separators
set-option -g status-right "#[fg=#313244,bg=#1e1e2e]#[fg=#cdd6f4,bg=#313244] %Y-%m-%d #[fg=#45475a,bg=#313244]│#[fg=#cdd6f4,bg=#313244] %H:%M #[fg=#89b4fa,bg=#313244]#[fg=#1e1e2e,bg=#89b4fa,bold] 󰥔 "

# Window status styling - inactive windows
set-option -g window-status-format " #[fg=#bac2de,bg=#313244]── #W ──#[fg=#313244,bg=#1e1e2e] "

# Window status styling - active window
set-option -g window-status-current-format " #[fg=#1e1e2e,bg=#f38ba8,bold]── 🌟 #W ──#[fg=#f38ba8,bg=#1e1e2e] "

# Window status separator
set-option -g window-status-separator ""

# Pane border styling - modern and subtle
set-option -g pane-border-style fg=#313244
set-option -g pane-active-border-style fg=#89b4fa

# Pane border format with indicators
set-option -g pane-border-format "#[fg=#89b4fa,bg=#1e1e2e] #{?pane_active,#[bold],}#P: #{pane_current_command} #[fg=#45475a]#{pane_current_path} "
set-option -g pane-border-status off

# Message styling
set-option -g message-style bg=#89b4fa,fg=#1e1e2e,bold
set-option -g message-command-style bg=#89b4fa,fg=#1e1e2e,bold

# Copy mode styling
set-option -g mode-style bg=#f38ba8,fg=#1e1e2e

# Clock mode
set-option -g clock-mode-colour "#89b4fa"
set-option -g clock-mode-style 24

# Terminal overrides for better support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ======================
# 🔄 Key Bindings
# ======================
# Unbind default keys
unbind r
unbind f
unbind b
unbind p

# New session with name prompt
bind-key N command-prompt -p "New session name:" "new-session -s '%%'"  # ✨ Create new named session

# New session with name prompt
bind-key N command-prompt -p "New session name:" "new-session -s '%%'"  # ✨ Create new named session

# Session switching shortcuts
bind-key b switch-client -t basic     # ⬅️ Switch to 'basic' session
bind-key o switch-client -t obsidian  # 📓 Switch to 'obsidian' session
bind-key p switch-client -t perso     # 👤 Switch to 'perso' session
bind-key f switch-client -t front     # ➡️ Switch to 'front' session

# Configuration reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "✅ Config reloaded!"

# Window management
bind-key & kill-window                # ❌ Close window without confirmation
bind-key x kill-pane                 # ❌ Close pane without confirmation

# New named window
bind-key c command-prompt -p "Window name:" "neww -n '%%'"  # 🪟 Create new named window

# Vim-style pane navigation
bind h select-pane -L                 # ⬅️ Select left pane
bind j select-pane -D                 # ⬇️ Select down pane
bind k select-pane -U                 # ⬆️ Select up pane
bind l select-pane -R                 # ➡️ Select right pane

# Custom pane creation with auto-kill logic
bind C {
    splitw -f -h -l70% ''
    set-hook -p pane-mode-changed 'if -F "#{!=:#{pane_mode},copy-mode}" "kill-pane"'
    copy-mode -s'{last}'
}

# ======================
# 📋 Copy Mode (Vim-style)
# ======================
set-window-option -g mode-keys vi                     # 🔤 Use vi keys in copy mode

# Ctrl+Space enters copy mode (no prefix needed)
bind-key -n C-Space copy-mode \; send-keys -X history-bottom  # 📜 Enter copy mode at bottom (G)

# In copy mode: v to start selection, y to copy, Escape to cancel
bind-key -T copy-mode-vi v   send-keys -X begin-selection  # ✂️ Start selection
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel  # 📋 Copy & exit
bind-key -T copy-mode-vi Escape send-keys -X cancel         # ❌ Cancel & exit

# ======================
# 🔌 Plugin Management
# ======================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'sainnhe/tmux-fzf'

# ======================
# 🎨 Plugin Configuration
# ======================
# Extrakto - better text extraction
set -g @extrakto_split_size "15"
set -g @extrakto_grab_area "window recent"

# ======================
# 💾 Session Persistence
# ======================
set -g @continuum-restore 'on'
set -g @resurrect-dir '~/.config/tmux/resurrect'
set -g @resurrect-processes 'false'  # Don't restore any processes (vim, etc)
set -g @resurrect-capture-pane-contents 'off'  # Don't restore pane contents

# ======================
# 🚀 Initialize TPM
# ======================
run-shell "$HOME/.config/tmux/plugins/tpm/tpm"
